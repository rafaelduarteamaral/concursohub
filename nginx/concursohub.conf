# ConcursoHub Nginx Configuration
# Reverse proxy for Next.js (4000 → 3000) and Fastify API (4001 → 3001)
# Listens on port 8080 to coexist with other projects on the same VPS.

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=concursohub_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=concursohub_web:10m rate=60r/s;

# Upstream definitions
upstream concursohub_nextjs {
    server 127.0.0.1:4000;
    keepalive 32;
}

upstream concursohub_fastify {
    server 127.0.0.1:4001;
    keepalive 32;
}

# HTTP server on port 8080
server {
    listen 8080;
    server_name concursohub.local _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    client_max_body_size 10m;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # API routes → Fastify (port 4001 → 3001 internally)
    location /api/v1/ {
        limit_req zone=concursohub_api burst=50 nodelay;

        proxy_pass http://concursohub_fastify;
        proxy_set_header Connection "";
    }

    # Next.js static files — long cache
    location /_next/static/ {
        proxy_pass http://concursohub_nextjs;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_set_header Connection "";
    }

    # Next.js image optimization
    location /_next/image {
        proxy_pass http://concursohub_nextjs;
        proxy_set_header Connection "";
    }

    # Static public files
    location /favicon.ico {
        proxy_pass http://concursohub_nextjs;
        add_header Cache-Control "public, max-age=86400";
        proxy_set_header Connection "";
    }

    location /robots.txt {
        proxy_pass http://concursohub_nextjs;
        add_header Cache-Control "public, max-age=3600";
        proxy_set_header Connection "";
    }

    # Everything else → Next.js (port 4000 → 3000 internally)
    location / {
        limit_req zone=concursohub_web burst=100 nodelay;

        proxy_pass http://concursohub_nextjs;
        proxy_set_header Connection "";
        proxy_set_header Upgrade $http_upgrade;

        proxy_buffering off;
        proxy_request_buffering off;
    }
}

